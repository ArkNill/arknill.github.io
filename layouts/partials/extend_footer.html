{{- /* Reading progress bar — fixed at top */ -}}
{{ if .IsPage }}
<div id="reading-progress-wrap" style="position:fixed;top:0;left:0;width:100%;height:3px;z-index:9999;background:transparent;">
  <div id="reading-progress" style="height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--accent-secondary));transition:width 80ms linear;border-radius:0 2px 2px 0;"></div>
</div>
{{ end }}
